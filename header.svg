<svg viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg" width="900" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#020818"/>
      <stop offset="45%"  stop-color="#03045e"/>
      <stop offset="100%" stop-color="#023e8a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="50%" r="40%">
      <stop offset="0%"   stop-color="#0096FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#020818" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="78%" cy="55%" r="35%">
      <stop offset="0%"   stop-color="#00b4d8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#020818" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0096FF" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#0096FF" stop-opacity="0.8"/>
      <stop offset="70%"  stop-color="#00b4d8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0">
        <animate attributeName="offset" values="-0.5;1.5" dur="4s" repeatCount="indefinite" begin="1s"/>
      </stop>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.06">
        <animate attributeName="offset" values="0;2" dur="4s" repeatCount="indefinite" begin="1s"/>
      </stop>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0">
        <animate attributeName="offset" values="0.5;2.5" dur="4s" repeatCount="indefinite" begin="1s"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="900" height="180" fill="url(#bgGrad)" rx="0"/>

  <!-- Glow blobs -->
  <rect width="900" height="180" fill="url(#glow1)"/>
  <rect width="900" height="180" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g stroke="#0096FF" stroke-width="0.4" opacity="0.12">
    <line x1="0"   y1="36"  x2="900" y2="36"/>
    <line x1="0"   y1="72"  x2="900" y2="72"/>
    <line x1="0"   y1="108" x2="900" y2="108"/>
    <line x1="0"   y1="144" x2="900" y2="144"/>
    <line x1="90"  y1="0"   x2="90"  y2="180"/>
    <line x1="180" y1="0"   x2="180" y2="180"/>
    <line x1="270" y1="0"   x2="270" y2="180"/>
    <line x1="360" y1="0"   x2="360" y2="180"/>
    <line x1="450" y1="0"   x2="450" y2="180"/>
    <line x1="540" y1="0"   x2="540" y2="180"/>
    <line x1="630" y1="0"   x2="630" y2="180"/>
    <line x1="720" y1="0"   x2="720" y2="180"/>
    <line x1="810" y1="0"   x2="810" y2="180"/>
  </g>

  <!-- Animated floating dots -->
  <circle cx="72" cy="42" r="1.5" fill="#0096FF" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="108" r="1.2" fill="#00b4d8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.4s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle cx="810" cy="72" r="1.8" fill="#0096FF" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.8s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="720" cy="144" r="1.3" fill="#00b4d8" opacity="0.55">
    <animate attributeName="opacity" values="0.55;0.1;0.55" dur="3.5s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <circle cx="54"  cy="144" r="1.0" fill="#0096FF" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.05;0.4" dur="4.0s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="846" cy="36"  r="1.6" fill="#00b4d8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.08;0.5" dur="2.6s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="360" cy="18"  r="1.1" fill="#0096FF" opacity="0.45">
    <animate attributeName="opacity" values="0.45;0.08;0.45" dur="3.3s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <circle cx="630" cy="162" r="1.4" fill="#00b4d8" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.9s" repeatCount="indefinite" begin="0.9s"/>
  </circle>

  <!-- Glowing orbs (blurred) -->
  <circle cx="200" cy="90" r="55" fill="#0096FF" opacity="0.07" filter="url(#blur8)"/>
  <circle cx="700" cy="90" r="45" fill="#00b4d8" opacity="0.07" filter="url(#blur8)"/>

  <!-- Horizontal accent line -->
  <rect x="150" y="126" width="600" height="1" fill="url(#lineGrad)" opacity="0.6"/>

  <!-- NAME -->
  <text
    x="450" y="82"
    font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif"
    font-size="44"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="1"
    filter="url(#blur2)"
    opacity="0.35">Nirdosh Lamichhane</text>
  <text
    x="450" y="82"
    font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif"
    font-size="44"
    font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="1">Nirdosh Lamichhane</text>

  <!-- ROLE -->
  <text
    x="450" y="114"
    font-family="'Segoe UI', 'SF Pro Display', Arial, sans-serif"
    font-size="16"
    font-weight="400"
    fill="#90e0ef"
    text-anchor="middle"
    letter-spacing="3">FULL STACK DEVELOPER  ·  BHAKTAPUR, NEPAL</text>

  <!-- Shimmer overlay -->
  <rect width="900" height="180" fill="url(#shimmer)" opacity="1"/>

  <!-- Top & bottom edge fade -->
  <rect width="900" height="12" fill="url(#bgGrad)" opacity="0.6"/>
  <rect y="168" width="900" height="12" fill="url(#bgGrad)" opacity="0.6"/>
</svg>
